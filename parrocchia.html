<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parrocchia San Giovanni</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">

    <header class="bg-blue-600 p-4 text-white text-center">
        <h1 class="text-3xl font-bold">Parrocchia San Giovanni</h1>
    </header>

    <main class="container mx-auto my-8 p-4 bg-white rounded-lg shadow-md">
        <img src="path/to/your/image.jpg" alt="Parrocchia" class="w-full h-64 object-cover rounded-lg mb-4">

        <section class="mb-6">
            <h2 class="text-2xl font-semibold mb-2">Contatti</h2>
            <p>Email: <a href="mailto:info@parrocchiasangiovanni.it" class="text-blue-500">info@parrocchiasangiovanni.it</a></p>
            <p>Telefono: <a href="tel:+390123456789" class="text-blue-500">+39 012 345 6789</a></p>
        </section>

        <section>
            <h2 class="text-2xl font-semibold mb-2">Orari della Messa</h2>
            <ul class="list-disc list-inside">
                <li>Domenica: 10:00, 18:00</li>
                <li>Feriali: 08:00, 18:00</li>
                <li>Festivi: 09:00, 11:00</li>
            </ul>
        </section>
    </main>

    <footer class="bg-gray-200 text-center p-4">
        <p>© 2026 Parrocchia San Giovanni. Tutti i diritti riservati.</p>
    </footer>

</body>
</html>
